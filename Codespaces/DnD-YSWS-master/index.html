<!DOCTYPE html>
<html>
    <head>
        <title> the most awesomest title</title>
        <style>
            /* <!-- Turning off the scroll bar --> */
            body {
                margin: 0;
                padding: 0;
            }
            html, body {
                overflow: hidden;
            }

        </style>

    </head>
    <body onresize="resizeWebpage()" onload="resizeWebpage()">
        <iframe id="godotWebpage" src="https://file.garden/ZvYk8SE050beWacV/Sprun/0.0.5/Sprun.html">
        </iframe>
        
        <script>
            function resizeWebpage() {
                let width = window.innerWidth;
                let height = window.innerHeight;

                const godotWebpage = document.getElementById('godotWebpage')
                godotWebpage.width = width + 1;
                godotWebpage.height = height + 1; // + 1 guarantees it takes up the entire screen
                console.log('this is a onsole logging')
            }
            // Alas, why can't everything be in one language...
            // also note that I need to remove all margins (or change the background color)
        </script>
    </body>
</html>
